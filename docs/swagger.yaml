definitions:
  handlers.CreateAccountRequest:
    properties:
      document_number:
        example: "12345678900"
        type: string
    type: object
  handlers.CreateAccountResponse:
    properties:
      account_id:
        example: 1
        type: integer
      document_number:
        example: "12345678900"
        type: string
    type: object
  handlers.CreateTransactionRequest:
    properties:
      account_id:
        example: 1
        type: integer
      amount:
        example: 123.45
        type: number
      operation_type_id:
        example: 1
        type: integer
      tenure:
        example: 3
        type: integer
    type: object
  handlers.CreateTransactionResponse:
    properties:
      account_id:
        type: integer
      amount:
        type: number
      event_date:
        type: string
      installment_plan:
        $ref: '#/definitions/handlers.InstallmentPlanItem'
      operation_type_id:
        type: integer
      transaction_id:
        type: integer
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        example: record not found
        type: string
    type: object
  handlers.GetAccountResponse:
    properties:
      account_id:
        example: 1
        type: integer
      active_installment_plans:
        items:
          $ref: '#/definitions/handlers.InstallmentPlanItem'
        type: array
      balance:
        example: 0
        type: number
      document_number:
        example: "12345678900"
        type: string
    type: object
  handlers.InstallmentPlanItem:
    properties:
      next_due_date:
        type: string
      paid_emis:
        type: integer
      plan_id:
        type: integer
      remaining_emis:
        type: integer
      tenure:
        type: integer
      total_amount:
        type: number
    type: object
  handlers.PayInstallmentResponse:
    properties:
      paid_emis:
        type: integer
      remaining_emis:
        type: integer
    type: object
info:
  contact: {}
paths:
  /accounts:
    post:
      consumes:
      - application/json
      description: Creates an account for a document number.
      parameters:
      - description: Document number
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.CreateAccountResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create account
      tags:
      - accounts
  /accounts/{accountId}:
    get:
      description: Returns account id, document number, balance, and active installment
        plans (incomplete).
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.GetAccountResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get account
      tags:
      - accounts
  /accounts/{accountId}/installments/{planId}/pay:
    post:
      description: Records a credit voucher for this EMI and advances the plan (does
        not change the original purchase debit).
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      - description: Installment plan ID
        in: path
        name: planId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PayInstallmentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Pay one installment
      tags:
      - accounts
  /transactions:
    post:
      consumes:
      - application/json
      description: 'Types 1–3 debit (stored negative), type 4 credit (stored positive).
        For type 2, optional tenure (>1) creates an installment plan; omit tenure
        for a lump debit only. EMI repayment: POST .../installments/.../pay (credit
        voucher). Fails if balance would go negative on debits.'
      parameters:
      - description: Transaction payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateTransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.CreateTransactionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create transaction
      tags:
      - transactions
swagger: "2.0"
